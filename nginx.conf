server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ----- Security headers ---------------------------------------------------
    # Sent on every response from this server block. `always` ensures the header
    # is included for error responses too.
    #
    # Tuning notes:
    # - CSP allows the backend (cozie-kohl.vercel.app) and Firebase Storage
    #   (firebasestorage.googleapis.com / *.appspot.com) for the album-art and
    #   audio file URLs. Update if you swap CDNs.
    # - HSTS assumes you're terminating TLS in front of this nginx (CDN, ELB).
    #   Drop `preload` until you submit to https://hstspreload.org/.
    # - frame-ancestors 'none' blocks clickjacking; matches X-Frame-Options.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://cozie-kohl.vercel.app https://firebasestorage.googleapis.com https://*.appspot.com; media-src 'self' https: blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # ----- Gzip text assets ---------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml application/xml+rss text/javascript
               image/svg+xml;

    # Long-cache hashed Vite assets
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # PWA manifest + favicon — short cache so updates roll out quickly
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=3600";
        types { application/manifest+json webmanifest; }
        default_type application/manifest+json;
    }

    # SPA history fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache index.html (so users get the latest build)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
